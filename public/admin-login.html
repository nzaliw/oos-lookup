<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — OOS Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080f;--surface:#0e1120;--border:#1e2235;--accent:#00d4ff;--text:#dde3f0;--muted:#5a6380;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(167,139,250,.06) 0%,transparent 65%);pointer-events:none}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px;width:100%;max-width:420px;position:relative;z-index:1}
.lock{text-align:center;font-size:42px;margin-bottom:24px}
h2{font-size:24px;font-weight:800;text-align:center;margin-bottom:6px}
.sub{text-align:center;color:var(--muted);font-size:13px;font-family:'DM Mono',monospace;margin-bottom:36px}
label{display:block;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-family:'DM Mono',monospace}
.pwd-wrap{position:relative}
input[type=password],input[type=text]{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:15px 48px 15px 18px;font-family:'DM Mono',monospace;font-size:16px;color:var(--text);outline:none;transition:border-color .2s;letter-spacing:3px}
input:focus{border-color:var(--accent)}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);padding:4px;line-height:1}
.btn{width:100%;background:var(--accent);color:#06080f;border:none;border-radius:12px;padding:16px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;transition:all .2s;letter-spacing:.3px}
.btn:hover{background:#33ddff;transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:wait;transform:none}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red);border-radius:10px;padding:12px 16px;font-size:13px;font-family:'DM Mono',monospace;margin-top:16px;display:none}
.back{display:block;text-align:center;margin-top:24px;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;text-decoration:none;transition:color .2s}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="card">
  <div class="lock">🔐</div>
  <h2>Espace Admin</h2>
  <p class="sub">OOS Data Lookup · Accès restreint</p>
  <label for="pwd">Mot de passe</label>
  <div class="pwd-wrap">
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
    <button class="eye" onclick="togglePwd()" type="button">👁</button>
  </div>
  <div class="err" id="err"></div>
  <button class="btn" id="btnLogin" onclick="doLogin()">Accéder au tableau de bord</button>
  <a class="back" href="/">← Retour à la recherche</a>
</div>
<script>
function togglePwd(){const i=document.getElementById('pwd');i.type=i.type==='password'?'text':'password'}
async function doLogin(){
  const pwd=document.getElementById('pwd').value;
  const btn=document.getElementById('btnLogin');
  const err=document.getElementById('err');
  err.style.display='none';
  if(!pwd){showErr('Saisissez votre mot de passe.');return}
  btn.disabled=true;btn.textContent='Vérification…';
  try{
    const r=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
    const j=await r.json();
    if(j.success){window.location.href='/admin/dashboard'}
    else{showErr(j.error||'Mot de passe incorrect.')}
  }catch{showErr('Erreur de connexion.')}
  finally{btn.disabled=false;btn.textContent='Accéder au tableau de bord'}
}
function showErr(m){const e=document.getElementById('err');e.textContent='⚠ '+m;e.style.display='block'}
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
