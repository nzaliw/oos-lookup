<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recherche Agent MSISDN — OOS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--surface:#0e1120;--surface2:#161929;--border:#1e2235;
  --accent:#00d4ff;--accent2:#a78bfa;
  --green:#10b981;--orange:#f59e0b;--red:#ef4444;
  --text:#dde3f0;--muted:#5a6380;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;overflow-x:hidden}
body::before{content:'';position:fixed;top:-300px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(0,212,255,.05) 0%,transparent 65%);pointer-events:none;z-index:0}
.container{width:100%;max-width:820px;position:relative;z-index:1}

/* ── Header ── */
header{text-align:center;margin-bottom:48px}
.tag{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;padding:6px 16px;border:1px solid rgba(0,212,255,.25);border-radius:20px;margin-bottom:20px;background:rgba(0,212,255,.05)}
h1{font-size:clamp(26px,5vw,44px);font-weight:800;line-height:1.1;letter-spacing:-1px}
h1 span{color:var(--accent)}
.subtitle{margin-top:10px;color:var(--muted);font-size:13px;font-family:'DM Mono',monospace}

/* ── Search ── */
.search-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:32px;box-shadow:0 0 60px rgba(0,212,255,.04)}
.field-label{display:block;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-family:'DM Mono',monospace}
.input-row{display:flex;gap:12px}
.phone-input{flex:1;background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:16px 20px;font-family:'DM Mono',monospace;font-size:20px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:2px}
.phone-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.08)}
.phone-input::placeholder{color:var(--muted);font-size:13px;letter-spacing:1px}
.btn-search{background:var(--accent);color:#06080f;border:none;border-radius:12px;padding:16px 32px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-search:hover{background:#33ddff;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,212,255,.25)}
.btn-search.loading{opacity:.7;cursor:wait;transform:none}

/* ── States ── */
.state-box{text-align:center;padding:64px 20px;color:var(--muted)}
.state-icon{font-size:52px;margin-bottom:16px;opacity:.5}
.state-msg{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text)}
.state-sub{font-size:13px;font-family:'DM Mono',monospace}

/* ── Results meta ── */
.results-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.results-label{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-family:'DM Mono',monospace;font-weight:500}
.badge.found{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.2)}
.badge.none{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}

/* ── Agent Card ── */
.cards-grid{display:flex;flex-direction:column;gap:24px}

.agent-card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  overflow:hidden;animation:slideIn .35s ease both;
  transition:border-color .2s,box-shadow .2s;
}
.agent-card:hover{border-color:rgba(0,212,255,.3);box-shadow:0 4px 40px rgba(0,212,255,.07)}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* Card top band */
.card-band{height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.card-band.hvc{background:linear-gradient(90deg,#10b981,#34d399)}
.card-band.mvc{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.card-band.lvc{background:linear-gradient(90deg,#ef4444,#f87171)}

/* Card header */
.card-header{display:flex;justify-content:space-between;align-items:flex-start;padding:24px 28px 20px;gap:16px;flex-wrap:wrap}
.agent-name{font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.3}
.msisdn-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:8px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);font-family:'DM Mono',monospace;font-size:14px;color:var(--accent);font-weight:500}
.msisdn-pill::before{content:'📡';font-size:11px}

.seg-badge{padding:8px 18px;border-radius:10px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;flex-shrink:0;align-self:flex-start;margin-top:4px}
.seg-badge.hvc{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.25)}
.seg-badge.mvc{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.seg-badge.lvc{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.seg-badge.default{background:rgba(90,99,128,.1);color:var(--muted);border:1px solid var(--border)}

/* Site row */
.site-row{display:flex;align-items:center;gap:10px;padding:12px 28px;background:rgba(167,139,250,.04);border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-size:13px;color:var(--muted)}
.site-row strong{color:var(--text);font-weight:600}
.site-dot{width:5px;height:5px;border-radius:50%;background:var(--accent2);flex-shrink:0}

/* Metrics */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--border)}
.metric{background:var(--surface);padding:22px 22px;display:flex;flex-direction:column;gap:5px}
.metric-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.metric-value{font-size:24px;font-weight:800;line-height:1;font-family:'Syne',sans-serif}
.metric-unit{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.metric.float  .metric-value{color:var(--accent)}
.metric.hour   .metric-value{color:var(--accent2)}
.metric.dtarget .metric-value{color:var(--orange)}
.metric.otarget .metric-value{color:var(--orange)}
.metric.days   .metric-value{color:var(--red)}

/* OOS Bar */
.oos-section{padding:20px 28px 26px}
.oos-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.oos-title{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.oos-pct{font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.oos-track{height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.oos-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.oos-fill.low {background:linear-gradient(90deg,#10b981,#34d399)}
.oos-fill.mid {background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.oos-fill.high{background:linear-gradient(90deg,#ef4444,#f87171)}
.oos-legend{display:flex;gap:20px;margin-top:10px}
.oos-leg-item{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.oos-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

footer{margin-top:60px;padding-bottom:20px}
footer a{color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;text-decoration:none;opacity:.4;transition:opacity .2s}
footer a:hover{opacity:1}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="tag">📡 OOS Data Lookup</div>
    <h1>Recherche Agent<br><span>MSISDN</span></h1>
    <p class="subtitle">Consultez les données OOS d'un agent par son numéro</p>
  </header>

  <div class="search-card">
    <label class="field-label" for="phoneField">Numéro Agent MSISDN</label>
    <div class="input-row">
      <input type="tel" class="phone-input" id="phoneField"
             placeholder="Ex: 650003332" autocomplete="off" maxlength="20">
      <button class="btn-search" id="btnSearch" onclick="doSearch()">Rechercher</button>
    </div>
  </div>

  <div id="resultsArea">
    <div class="state-box">
      <div class="state-icon">🔍</div>
      <div class="state-msg">Saisissez un numéro MSISDN</div>
      <div class="state-sub">Recherche partielle supportée · min. 3 chiffres</div>
    </div>
  </div>

</div>
<footer><a href="/admin">⚙ Administration</a></footer>

<script>
const area = document.getElementById('resultsArea');
const btn  = document.getElementById('btnSearch');

function segInfo(s) {
  if (!s) return { cls: 'default', band: '' };
  const l = s.toLowerCase();
  if (l.includes('hvc')) return { cls: 'hvc', band: 'hvc' };
  if (l.includes('mvc')) return { cls: 'mvc', band: 'mvc' };
  if (l.includes('lvc')) return { cls: 'lvc', band: 'lvc' };
  return { cls: 'default', band: '' };
}

function fmtNum(v) {
  const n = parseFloat(v);
  return isNaN(n) ? '—' : n.toLocaleString('fr-FR', { maximumFractionDigits: 2 });
}

function oosClass(pct) {
  if (pct < 40) return 'low';
  if (pct < 70) return 'mid';
  return 'high';
}

function buildCard(r, idx) {
  const seg   = r['segment_group'] || '';
  const si    = segInfo(seg);
  const name  = r['Name'] || 'Agent inconnu';
  const msisdn  = r['Agent MSISDN'] || '—';
  const site    = r['SITENAME'] || '—';
  const avgFloat  = r['Average of avg_float'];
  const avgHour   = r['Average of avg_hour_flag'];
  const dayTarget = r['Average of day_target'];
  const oosTarget = r['Average of oos_target'];
  const daysOos   = r['Average of days_oos'];

  const totalDays = 29;
  const rawPct = Math.min(100, Math.round((parseFloat(daysOos) / totalDays) * 100)) || 0;
  const oosC = oosClass(rawPct);

  return `
  <div class="agent-card" style="animation-delay:${idx * 70}ms">
    <div class="card-band ${si.band}"></div>
    <div class="card-header">
      <div>
        <div class="agent-name">${name}</div>
        <div class="msisdn-pill">${msisdn}</div>
      </div>
      <div class="seg-badge ${si.cls}">${seg || 'N/A'}</div>
    </div>

    <div class="site-row">
      <span class="site-dot"></span>
      Site de rattachement : <strong>${site}</strong>
    </div>

    <div class="metrics-grid">
      <div class="metric float">
        <div class="metric-label">Float Moyen</div>
        <div class="metric-value">${fmtNum(avgFloat)}</div>
        <div class="metric-unit">avg_float</div>
      </div>
      <div class="metric hour">
        <div class="metric-label">Heure Flag Moy.</div>
        <div class="metric-value">${fmtNum(avgHour)}</div>
        <div class="metric-unit">avg_hour_flag</div>
      </div>
      <div class="metric dtarget">
        <div class="metric-label">Obj. Journalier</div>
        <div class="metric-value">${fmtNum(dayTarget)}</div>
        <div class="metric-unit">day_target</div>
      </div>
      <div class="metric otarget">
        <div class="metric-label">Objectif OOS</div>
        <div class="metric-value">${fmtNum(oosTarget)}</div>
        <div class="metric-unit">oos_target</div>
      </div>
      <div class="metric days">
        <div class="metric-label">Jours OOS</div>
        <div class="metric-value">${fmtNum(daysOos)}</div>
        <div class="metric-unit">/ ${totalDays} jours</div>
      </div>
    </div>

    <div class="oos-section">
      <div class="oos-header">
        <span class="oos-title">Taux d'indisponibilité OOS</span>
        <span class="oos-pct" style="color:var(--${oosC === 'low' ? 'green' : oosC === 'mid' ? 'orange' : 'red'})">${rawPct}%</span>
      </div>
      <div class="oos-track">
        <div class="oos-fill ${oosC}" style="width:0%" data-w="${rawPct}%"></div>
      </div>
      <div class="oos-legend">
        <div class="oos-leg-item"><span class="oos-leg-dot" style="background:#10b981"></span> &lt; 40% Faible</div>
        <div class="oos-leg-item"><span class="oos-leg-dot" style="background:#f59e0b"></span> 40–70% Moyen</div>
        <div class="oos-leg-item"><span class="oos-leg-dot" style="background:#ef4444"></span> &gt; 70% Élevé</div>
      </div>
    </div>
  </div>`;
}

async function doSearch() {
  const q = document.getElementById('phoneField').value.trim();
  if (!q) {
    area.innerHTML = `<div class="state-box"><div class="state-icon">💬</div><div class="state-msg">Saisissez un numéro MSISDN</div></div>`;
    return;
  }
  btn.classList.add('loading'); btn.textContent = 'Recherche…';

  try {
    const res  = await fetch(`/api/search?msisdn=${encodeURIComponent(q)}`);
    const json = await res.json();

    if (json.error) {
      area.innerHTML = `<div class="state-box"><div class="state-icon">⚠️</div><div class="state-msg">${json.error}</div></div>`;
      return;
    }
    if (!json.results.length) {
      area.innerHTML = `
        <div class="results-meta">
          <span class="results-label">Résultats pour « ${q} »</span>
          <span class="badge none">❌ Aucun résultat</span>
        </div>
        <div class="state-box">
          <div class="state-icon">🔎</div>
          <div class="state-msg">Numéro introuvable</div>
          <div class="state-sub">Vérifiez le numéro et réessayez</div>
        </div>`;
      return;
    }

    const upd = json.lastUpdate
      ? ` · MàJ ${new Date(json.lastUpdate).toLocaleDateString('fr-FR')}` : '';
    let html = `<div class="results-meta">
      <span class="results-label">Résultats pour « ${q} »${upd}</span>
      <span class="badge found">✓ ${json.total} fiche${json.total > 1 ? 's' : ''}</span>
    </div><div class="cards-grid">`;
    json.results.forEach((r, i) => { html += buildCard(r, i); });
    html += '</div>';
    area.innerHTML = html;

    requestAnimationFrame(() => {
      document.querySelectorAll('.oos-fill').forEach(el => {
        el.style.width = el.dataset.w;
      });
    });
  } catch {
    area.innerHTML = `<div class="state-box"><div class="state-icon">💥</div><div class="state-msg">Erreur de connexion</div></div>`;
  } finally {
    btn.classList.remove('loading'); btn.textContent = 'Rechercher';
  }
}

document.getElementById('phoneField').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
